<html>
<head>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/css/bootstrap.min.css">
<!-- jQuery library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!-- Latest compiled JavaScript -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>

<style>
body {
    background-color: #ffffff
} 

.split{
    margin-left: 430px;
    display: flex;

}

#navbar {
    background-color: white;
    border-bottom: none;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}

.navbar-container {
    background-color: white;
    padding: 5px 15px; /* Reduced padding */
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 60px; /* Set a reasonable minimum height */
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}

.logo-section {
    flex-shrink: 0;
    width: 150px;
    height: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 600px;
}

.logo-section img {
    width: 200px; /* Slightly smaller logo */
    height: 150px;
}

.hidden {
  display: none;
}

/*.search-section {
    flex: 1;
    max-width: 500px;
    margin: 0 20px;
}*/


.search-section {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
    max-width: 260px;
    margin: 0;
    background-color: white;
}

.search-section input {
    width: 180px;
    min-width: 120px;
}

.right-side {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: auto;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 15px;
}

.upper-links {
    display: inline-block;
    padding: 5px 10px; /* Reduced padding */
    line-height: 20px; /* Reduced line height */
    font-family: 'Roboto', sans-serif;
    font-size: 12px;
    letter-spacing: 0;
    color: inherit;
    border: none;
    outline: none;
    text-decoration: none;
    color: black;
}

.upper-links:hover {
    color: #ffe11b;
    text-decoration: none;
}

.navbar-input {
    padding: 8px 12px; /* Reduced padding */
    border-radius: 2px 0 0 2px;
    border: 0 none;
    outline: 0 none;
    font-size: 14px; /* Slightly smaller font */
    width: 100%;
}

.navbar-button {
    background-color: #ffe11b;
    border: 1px solid #ffe11b;
    border-radius: 0 2px 2px 0;
    color: #565656;
    padding: 8px 15px; /* Reduced padding */
    height: 35px; /* Reduced height */
    cursor: pointer;
    border-left: none;
}

.cart-button {
    background-color:white;
    text-align: center;
    height: 35px; /* Reduced height */
    font-weight: 500;
    width: 100px; /* Slightly smaller width */
    display: inline-block;
    color:  blue;
    text-decoration: none;
    outline: none;
    font-size: 14px;
    margin-left: auto;
}

.cart-button:hover {
    text-decoration: none;
    color: #fff;
    cursor: pointer;
}

.cart-svg {
    display: inline-block;
    width: 14px; /* Slightly smaller */
    height: 14px;
    vertical-align: middle;
    margin-right: 6px;
}

.item-number {
    border-radius: 3px;
    background-color: rgba(0, 0, 0, .1);
    height: 18px; /* Slightly smaller */
    padding: 2px 5px;
    font-weight: 500;
    display: inline-block;
    color: #fff;
    line-height: 12px;
    margin-left: 8px;
    font-size: 11px;
}

.dropdown {
    position: relative;
    display: inline-block;
    margin-bottom: 0px;
}

.dropdown:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.dropdown:hover .links {
    color: #ffe11b;
}

.dropdown:hover .dropdown-menu {
    display: block;
}

.dropdown .dropdown-menu {
    position: absolute;
    top: 100%;
    display: none;
    background-color: #fff;
    color: #333;
    left: 0px;
    border: 0;
    border-radius: 0;
    box-shadow: 0 4px 8px -3px #555454;
    margin: 0;
    padding: 0px;
    z-index: 1000;
}

.links {
    color: #fff;
    text-decoration: none;
}

.links:hover {
    color: #ffe11b;
    text-decoration: none;
}

.profile-links {
    font-size: 12px;
    font-family: 'Roboto', sans-serif;
    border-bottom: 1px solid #e9e9e9;
    box-sizing: border-box;
    display: block;
    padding: 0 11px;
    line-height: 23px;
}

.profile-li {
    padding-top: 2px;
}
.right-side {
    display: flex;
    align-items: center;
    gap: 15px;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 15px;
}

.largenav {
    display: none;
}

.smallnav {
    display: block;
}

.smallsearch {
    margin-left: 15px;
    margin-top: 15px;
}

.menu {
    cursor: pointer;
}

@media screen and (min-width: 768px) {
    .largenav {
        display: block;
    }

    .smallnav {
        display: none;
    }

    .smallsearch {
        margin: 0px;
    }
}

/* Mobile responsive adjustments */
@media screen and (max-width: 767px) {
    .navbar-container {
        flex-direction: column;
        padding: 10px;
        gap: 10px;
    }

    .nav-links {
        order: -1;
        justify-content: center;
    }

    .nav-links a {
    color: black;
}

    

    .logo-section {
        order: 2;
    }
}
</style>
</head>
<body>
<div id="navbar">
    <div class="navbar-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="static/images/logoftour.png" alt="logo">
        </div>

        <div class="right-side d-flex align-items-center">
            <!-- Search Section -->
            <!--<div class="search-section d-flex align-items-center justify-content-end">
                <button class="search-toggle ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>
                </button>

                <form action="/search" method="get" class="search-form   hidden">
                    <input type="text" name="search" placeholder="Search products...">
                </form>
            </div>-->

            <!-- Navigation Links and Cart -->
            <div class="nav-links ">
                <div class="largenav">
                    <!--<a class="upper-links dropdown" href="#">Login & SignUp-->
                        <ul class="dropdown-menu">
                            <div class="ex"></div>
                            <li class="profile-li"><a class="profile-links" href="/customerlogin">Login</a></li>

        

  

        

                    </ul>
                </a>

                <a class="upper-links" href="/adminclick">Admin</a>

                <a class="upper-links dropdown" href="#">More</a>
                    
                    <ul class="dropdown-menu">
                        <li class="profile-li"><a class="profile-links" href="/send-feedback">Send Feedback</a></li>
                        <li class="profile-li"><a class="profile-links" href="/contactus">Contact Us</a></li>
                        <li class="profile-li"><a class="profile-links" href="/aboutus">About Us</a></li>
                    </ul>
                </a>
            </div>
            <div class="split">
                      <div class="search-section d-flex align-items-center justify-content-end">
                <button class="search-toggle ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>
                </button>

                <form action="/search" method="get" class="search-form   hidden" bg-white>
                    <input type="text" name="search" placeholder="Search products...">
                </form>
            </div>           
            <a class="cart-button" href="/cart">
                <svg class="cart-svg" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
                </svg>
                Cart
                <span class="item-number">{{ product_count_in_cart }}</span>
            </a>
         
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function(){

function openNav() {
document.getElementById("mySidenav").style.width = "70%";

document.body.style.backgroundColor = "rgba(0,0,0,0.4)";
}

document.querySelector(".search-toggle").onclick = function () {
  document.querySelector(".search-form").classList.toggle("hidden");
};

function closeNav() {
document.getElementById("mySidenav").style.width = "0";
document.body.style.backgroundColor = "rgba(0,0,0,0)";
}


});
</script>

</body>
</html>
